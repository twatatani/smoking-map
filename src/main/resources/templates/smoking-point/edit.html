<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>喫煙所データ</title>
	<link rel="stylesheet" th:href="@{/css/form.css}">
</head>

<body class="page">
	<div class="container">

		<h2 class="title">喫煙所データ</h2>

		<form th:action="${mode == 'delete'} ? 
	                      |/smoking-points/${sp.id}/delete| : 
	                      |/smoking-points/${sp.id}/edit|" th:object="${sp}" method="post" class="form">

			<div class="form-group">
				<label>名称：</label>
				<input type="text" th:field="*{name}" class="input">
				<div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error"></div>
			</div>

			<div class="form-group">
				<label>住所：</label>
				<input type="text" th:field="*{address}" id="address" class="input">
			</div>

			<div class="form-group">
				<label>緯度（latitude）：</label>
				<div class="inline">
					<input type="number" step="0.000001" th:field="*{latitude}" id="latitude" class="input">
					<button type="button" onclick="getCurrentLocation()" class="btn">現在地取得</button>
				</div>
			</div>

			<div class="form-group">
				<label>経度（longitude）：</label>
				<div class="inline">
					<input type="number" step="0.000001" th:field="*{longitude}" id="longitude" class="input">
					<button type="button" onclick="reverseGeocode()" class="btn">住所を自動入力</button>
				</div>
			</div>

			<div class="form-group">
				<label>開放時間（openTime）：</label>
				<input type="text" th:field="*{openTime}" placeholder="例：09:00" class="input">
			</div>

			<div class="form-group">
				<label>閉鎖時間（closeTime）：</label>
				<input type="text" th:field="*{closeTime}" placeholder="例：18:00" class="input">
			</div>

			<div class="form-group">
				<label>説明：</label>
				<textarea th:field="*{description}" rows="4" class="textarea"></textarea>
			</div>

			<button type="submit" class="btn submit-btn" th:text="${mode == 'delete'} ? '削除する' : '更新する'"></button>

			<a th:href="@{/smoking-points}" class="link">一覧に戻る</a>

		</form>

	</div>

	<script src="/js/geocode.js"></script>
</body>

</html>
